<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IELTS Computer-Based Writing Test - Part 1</title>
    <link rel="stylesheet" href="style-writing.css">
</head>
<body>
    <header class="top-header">
        <div class="user-id">IELTS Writing-Ielts Genius</div>
        
        <div class="header-controls">
            <div class="font-controls">
        <button class="header-btn" onclick="changeFontSize('increase')">A+</button>
        <button class="header-btn" onclick="changeFontSize('decrease')">A-</button>
        <button class="header-btn" onclick="changeFontSize('reset')">Reset</button>
    </div>
             <button class="header-btn" id="reset-btn" onclick="resetTest()">Reset All</button>
            <button class="header-btn" id="reload-btn" onclick="reloadData()">Reload</button>
            <button class="header-btn hide-btn" id="submit-btn" onclick="finishTest()">Submit</button>
        </div>
    </header>

    <div class="part-time-banner">
        <div class="part-label">
            <h1>Part 1</h1>
            <p>You should spend about 20 minutes on this task. Write at least 150 words.</p>
        </div>
        <div class="timer-display">
            <span id="timer">20 minutes left</span>
        </div>
    </div>

   <main class="test-container">
    <div id="prompt-pane" class="pane">
        <div id="task-content"></div>
    </div>

    <div id="response-pane" class="pane">
        <textarea id="writing-area" placeholder="Type your answer here..."></textarea>
    </div>
</main>
<footer class="test-footer">
    <div class="task-navigation">
        <button class="nav-btn active" id="btn-task1" onclick="switchTask(1)">Part 1</button>
        <button class="nav-btn" id="btn-task2" onclick="switchTask(2)">Part 2</button>
    </div>
    <div class="word-count-display">Word count: <strong id="word-count">0</strong></div>
    <div class="footer-right">
        </div>
</footer>

<script src="script.js"></script>

</body>
</html>
